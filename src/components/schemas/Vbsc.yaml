description: |
  Vbsc = vested benefit statement compact, is a reduced pension statement consisting of only the most important pension statement information.
  All monetary values are in Swiss Francs (CHF) unless explicitly stated otherwise.
  Short property names (3-4 chars) for QR code payload.
type: object
required:
  - ai
  - ayd
  - hoaw
  - lyd
  - pi
  - pn
  - ppn
  - rc
  - rd
  - ts
properties:
  ai:
    type: string
    description: Unique Account Identifier. Use IBAN format (ISO 13616) whenever possible. If the product does not have an IBAN, use the policy or contract number.
    examples:
      - 'CH9300762011623852957'
  ayd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development from Jan 1st of the current year to the reference date.
    required:
      - cg
      - fe
      - ic
      - td
      - tw
    examples:
      - cg: 570
        fe: -20
        ic: 50
        td: 2500
        tw: 0
  bch:
    type: boolean
    description: |
      Indicates whether a beneficiary change occurred.
      true = there was a beneficiary change.
      false = there was no beneficiary change.
      Presence of this field confirms the status is known; omission indicates the status is unknown.
    examples:
      - true
      - false
  div:
    type: number
    format: double
    description: |
      The amount withdrawn for pension equalization following a divorce.
      Presence of this field confirms a withdrawal occurred; omission indicates the status or amount is unknown.
    examples:
      - 10000
  hoaw:
    $ref: ./HomeOwnershipAvailableForWithdrawal.yaml
    description: Home ownership available for withdrawal.
  lyd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development for the full previous calendar year.
    required:
      - cg
      - fe
      - ic
      - td
      - tw
    examples:
      - cg: 1500
        fe: -20
        ic: 120
        td: 7000
        tw: 0
  p3y:
    type: object
    description: If this object is present, purchase activity information for the last 3 years is known. If it is missing, this information is unknown.
    required:
      - s
      - d
    properties:
      s:
        type: number
        format: double
        description: Cumulative purchase amount within the last 3 years.
        examples:
          - 15000
      d:
        $ref: ./generic/Date.yaml
        description: Date of the most recent purchase within the last 3 years.
        examples:
          - '2018-04-13'
  pi:
    $ref: ./PersonId.yaml
  plg:
    type: number
    format: double
    description: |
      The amount of pledged capital.
      Presence of this field confirms pledged capital information is known; omission indicates the status or amount is unknown.
    examples:
      - 20000
  pn:
    type: string
    description: Product name.
    examples:
      - "vested benefits account"
  ppn:
    $ref: ./ProviderName.yaml
  rc:
    type: object
    description: |
      Retirement capital balances.
      Consistency rules:
      - cb = cbly + sum of ayd-properties
      Minor rounding differences up to CHF 0.05 are acceptable.
    required:
      - cb
      - cbly
      - inv
    properties:
      cb:
        description: Current capital balance.
        $ref: ./CapitalBalance.yaml
        examples:
          - 110000
      cbly:
        $ref: ./CapitalBalance.yaml
        description: |
          Capital balance at the end of last year (Dec 31st). 
          Set to 0.0 if the account was opened or transferred to this provider during the current year.
        examples:
          - 106900
      bvg:
        type: number
        format: double
        description: BVG share as an absolute amount.
        examples:
          - 71500
      inv:
        type: number
        format: double
        description: Current invested share in percent (%). The remaining percentage (100% minus inv) represents the cash/liquidity balance.
        examples:
          - 80.0
  rd:
    $ref: ./generic/Date.yaml
    description: Reference date of vested benefit statement.
  ts:
    $ref: ./generic/DateTime.yaml
    description: Date and time of generation of the VestedBenefitStatement.
  wef:
    type: number
    format: double
    description: |
      The amount withdrawn for home ownership financing (WEF).
      Presence of this field confirms a withdrawal occurred; omission indicates the status or amount is unknown.
    examples:
      - 50000
