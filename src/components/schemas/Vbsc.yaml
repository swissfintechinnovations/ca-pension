description: |
  Vbsc = vested benefit statement compact, is a reduced pension statement consisting of only the most important pension statement information.
  All monetary values are in Swiss Francs (CHF) unless explicitly stated otherwise.
  Short property names (3-4 chars) for QR code payload.
type: object
required:
  - ai
  - ayd
  - bch
  - div
  - hoaw
  - lyd
  - p3y
  - pi
  - plg
  - pn
  - ppn
  - rc
  - rd
  - ts
  - wef
properties:
  ai:
    type: string
    description: Unique Account Identifier. Use IBAN format (ISO 13616) whenever possible. If the product does not have an IBAN, use the policy or contract number.
  ayd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development from Jan 1st of the current year to the reference date.
    examples:
      - cg: 570
        fe: -20
        ic: 50
        td: 2500
        tw: 0
  bch:
    type: object
    description: Beneficiary change (yes/no).
    required:
      - has
    properties:
      has:
        type: boolean
        description: Beneficiary change (yes/no).
        examples:
          - false
  div:
    type: object
    description: Divorce pension equalization withdrawal (yes/no). If has is true, val must be provided. If has is false, val must be omitted.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Divorce pension equalization withdrawal (yes/no).
        examples:
          - false
      val:
        type: number
        format: double
        description: Divorce pension equalization withdrawal amount.
        examples:
          - 0
  hoaw:
    $ref: ./HomeOwnershipAvailableForWithdrawal.yaml
    description: Home ownership available for withdrawal.
  lyd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development for the full previous calendar year. When not available set all values to 0.
    examples:
      - cg: 1500
        fe: -20
        ic: 120
        td: 7000
        tw: 0
  p3y:
    type: object
    description: Purchase activity within the last 3 years.
    required:
      - s
    properties:
      s:
        type: number
        format: double
        description: Cumulative purchase amount within the last 3 years. Use 0 if no purchases were made.
        examples:
          - 15000
      d:
        $ref: ./generic/Date.yaml
        description: Date of the most recent purchase within the last 3 years. May be omitted when s is 0.
  pi:
    $ref: ./PersonId.yaml
  plg:
    type: object
    description: Pledged (yes/no). If has is true, val must be provided. If has is false, val must be omitted.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Pledged (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: Pledged amount.
        examples:
          - 20000
  pn:
    type: string
    description: Product name.
    examples:
      - "vested benefits account"
  ppn:
    $ref: ./ProviderName.yaml
  rc:
    type: object
    description: |
      Retirement capital balances.
      Consistency rules:
      - cb = cbly + sum of ayd-properties
      Minor rounding differences up to CHF 0.05 are acceptable.
    required:
      - cb
      - cbly
    properties:
      cb:
        description: Current capital balance.
        $ref: ./CapitalBalance.yaml
        examples:
          - 110000
      cbly:
        $ref: ./CapitalBalance.yaml
        description: |
          Capital balance at the end of last year (Dec 31st). 
          Set to 0.0 if the account was opened or transferred to this provider during the current year.
        examples:
          - 106900
      bvg:
        type: number
        format: double
        description: BVG share as an absolute amount.
        examples:
          - 71500
      inv:
        type: number
        format: double
        description: Current invested share in percent (%). The remaining percentage (100% minus inv) represents the cash/liquidity balance.
        examples:
          - 80.0
  rd:
    $ref: ./generic/Date.yaml
    description: Reference date of vested benefit statement.
  ts:
    $ref: ./generic/DateTime.yaml
    description: Date and time of generation of the VestedBenefitStatement.
  wef:
    type: object
    description: WEF withdrawal (yes/no). If has is true, val must be provided. If has is false, val must be omitted.
    required:
      - has
    properties:
      has:
        type: boolean
        description: WEF withdrawal (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: WEF withdrawal amount.
        examples:
          - 50000
