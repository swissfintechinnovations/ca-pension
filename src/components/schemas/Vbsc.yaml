description: |
  Vbsc = vested benefit statement compact, is a reduced pension statement consisting of only the most important pension statement information.
  Short property names (3-4 chars) for QR code payload.
type: object
required:
  - pi
  - ppn
  - rc
  - ayd
  - lyd
  - plg
  - wth
  - pn
  - hoaw
  - rd
  - ts
properties:
  pi:
    $ref: ./PersonId.yaml
  ppn:
    $ref: ./ProviderName.yaml
  rc:
    type: object
    description: Retirement capital (balance and share breakdown).
    required:
      - cb
    properties:
      cb:
        $ref: ./CapitalBalance.yaml
      bvg:
        type: number
        format: double
        description: BVG share in percent (%).
        examples:
          - 65.5
      inv:
        type: number
        format: double
        description: Invested share in percent (%). The remaining percentage (100% minus inv) represents the cash/liquidity balance.
        examples:
          - 80.0
  ayd:
    description: Actual year capital development. The sum of bb and all capital development fields must equal the current balance (rc.cb).
    allOf:
      - $ref: ./CapitalDevelopment.yaml
      - type: object
        required:
          - bb
        properties:
          bb:
            type: number
            format: double
            description: Balance beginning of the actual year.
            examples:
              - 100000
  lyd:
    description: Last year data (capital development). The sum of bb and all capital development fields must equal be.
    allOf:
      - $ref: ./CapitalDevelopment.yaml
      - type: object
        required:
          - bb
          - be
        properties:
          bb:
            type: number
            format: double
            description: Balance beginning last year.
            examples:
              - 100000
          be:
            type: number
            format: double
            description: Balance at the end of last year.
            examples:
              - 106900
  plg:
    type: object
    description: Pledged (yes/no). Value is an optional sub-element.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Pledged (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: Pledged amount (optional).
        examples:
          - 20000
  wth:
    type: object
    description: Withdrawal (yes/no). Value is an optional sub-element.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Withdrawal (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: Withdrawal amount (optional).
        examples:
          - 50000
  pn:
    type: string
    description: Product name.
    examples:
      - "frankly vested benefits"
  hoaw:
    $ref: ./HomeOwnershipAvailableForWithdrawal.yaml
    description: Home ownership available for withdrawal.
  rd:
    $ref: ./generic/Date.yaml
    description: Reference date of vested benefit statement.
  ts:
    $ref: ./generic/DateTime.yaml
    description: Date and time of generation of the VestedBenefitStatement.
