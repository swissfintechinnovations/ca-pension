description: |
  3asc = 3a statement compact, is a reduced account statement consisting of only the most important account statement information.
  All monetary values are in Swiss Francs (CHF) unless explicitly stated otherwise.
  Short property names (3-4 chars) are used to minimize payload size.
type: object
required:
  - ai
  - cp
  - pn
  - ppn
  - pyd
  - rc
  - rd
  - ts
properties:
  ai:
    type: string
    description: Unique Account Identifier. Use IBAN format (ISO 13616) whenever possible. If the product does not have an IBAN, use the policy or contract number.
    examples:
      - 'CH9300762011623852957'
  cp:
    type: object
    description: Contribution potential (indicative, provider-specific view).
    required:
      - cy
    properties:
      cy:
        type: number
        format: double
        description: |
          Indicative remaining contribution capacity for the current year at this provider. 
          Calculated as the applicable annual cap minus deposits already made at THIS provider. 
          No guarantee of total tax deductibility if other 3a accounts exist.
        examples: 
          - 2500.00
      ret:
        type: number
        format: double
        description: |
          Indicative potential for retroactive purchases (past years). 
          Based solely on information available to this provider. 
          Non-binding and without legal effect regarding tax deductibility.
          Omission of this field indicates the amount is unknown.
        examples:
          - 8400.00
  pn:
    type: string
    description: Product name.
    examples:
      - "sparen 3a"
  ppn:
    $ref: ./ProviderName.yaml
  pyd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development for the full previous calendar year. When not available set all values to 0.
    required:
      - cg
      - de
      - fe
      - ic
      - wi
    examples:
      - cg: 1500
        de: 7056
        fe: -20
        ic: 50        
        wi: 0
  rc:
    type: object
    description: |
      Retirement capital properties.
      Consistency rules:
      - cb = cbpy + sum of cyd-properties
      Minor rounding differences up to CHF 0.05 are acceptable.
    required:
      - cb
      - cbpy
      - inv
    properties:
      cb:
        description: Current capital balance.
        $ref: ./CapitalBalance.yaml
        examples:
          - 44000
      cbpy:
        $ref: ./CapitalBalance.yaml
        description: |
          Capital balance at the end of the previous year (Dec 31st). 
          Set to 0.0 if the account was opened or transferred to this provider during the current year.
        examples:
          - 42000
      inv:
        type: number
        format: double
        description: Current invested share as an absolute amount. The remaining amount (cb minus inv) represents the cash/liquidity balance.
        examples:
          - 85520
  rd:
    $ref: ./generic/Date.yaml
    description: Reference date of 3a account statement.
  ts:
    $ref: ./generic/DateTime.yaml
    description: Date and time of generation of the 3a account statement.
  bch:
    type: boolean
    description: |
      Indicates whether a beneficiary change occurred.
      true = there was a beneficiary change.
      false = there was no beneficiary change.
      Presence of this field confirms the status is known; omission indicates the status is unknown.
    examples:
      - true
      - false
  cyd:
    $ref: ./CapitalDevelopment.yaml
    description: Capital development from Jan 1st of the current year to the reference date.
    required:
      - cg
      - de
      - fe
      - ic
      - wi
    examples:
      - cg: 200
        de: 1800
        fe: 0
        ic: 0
        wi: 0
  div:
    type: number
    format: double
    description: |
      The amount withdrawn for pension equalization following a divorce.
      Presence of this field confirms that the status and amount are known. Set to 0 if no withdrawal occurred.
      Omission indicates that the status or amount is unknown.
    examples:
      - 10000
  plg:
    type: number
    format: double
    description: |
      The amount of currently pledged capital.
      Presence of this field confirms that the status and amount are known. Set to 0 if no pledged capital exists.
      Omission indicates that the status or amount is unknown.
    examples:
      - 20000
  pw:
    type: boolean
    description: |
      Indicates whether a premium waiver in case of disability applies.
      true = a premium waiver applies.
      false = no premium waiver applies.
      Presence of this field confirms the status is known.
      Omission indicates the status is unknown.
    examples:
      - true
      - false
  wef:
    type: number
    format: double
    description: |
      The cumulative net amount withdrawn for home ownership financing (WEF).
      Based solely on information available to this provider, might be incomplete for technical reasons.
      Set to 0 if no withdrawal occurred. Omission indicates that the status or amount is unknown.
    examples:
      - 50000
