description: |
  3asc = 3a statement compact, is a reduced account statement consisting of only the most important account statement information.
  All monetary values are in Swiss Francs (CHF) unless explicitly stated otherwise.
  Short property names (3-4 chars) are used to minimize payload size.
type: object
required:
  - pi
  - ppn
  - rc
  - ayd
  - lyd
  - plg
  - wth
  - pw
  - pn
  - cp
  - rd
  - ts
properties:
  pi:
    $ref: ./PersonId.yaml
  ppn:
    $ref: ./ProviderName.yaml
  rc:
    type: object
    description: Retirement capital (balance and share breakdown).
    required:
      - cb
    properties:
      cb:
        $ref: ./CapitalBalance.yaml
      inv:
        type: number
        format: double
        description: Invested share in percent (%). The remaining percentage (100% minus inv) represents the cash/liquidity balance.
        examples:
          - 80.0
  ayd:
    description: Actual year capital development. The sum of bb and all capital development fields must equal the current balance (rc.cb).
    allOf:
      - $ref: ./CapitalDevelopment.yaml
      - type: object
        required:
          - bb
        properties:
          bb:
            type: number
            format: double
            description: Balance beginning of the actual year.
            examples:
              - 100000
  lyd:
    description: Last year data (capital development). The sum of bb and all capital development fields must equal be.
    allOf:
      - $ref: ./CapitalDevelopment.yaml
      - type: object
        required:
          - bb
          - be
        properties:
          bb:
            type: number
            format: double
            description: Balance beginning last year.
            examples:
              - 100000
          be:
            type: number
            format: double
            description: Balance at the end of last year.
            examples:
              - 106900
  plg:
    type: object
    description: Pledged (yes/no). Value is an optional sub-element.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Pledged (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: Pledged amount (optional).
        examples:
          - 20000
  wth:
    type: object
    description: Withdrawal (yes/no). Value is an optional sub-element.
    required:
      - has
    properties:
      has:
        type: boolean
        description: Withdrawal (yes/no).
        examples:
          - true
      val:
        type: number
        format: double
        description: Withdrawal amount (optional).
        examples:
          - 50000
  pw:
    type: boolean
    description: Premium waiver in case of disability (yes/no).
    examples:
      - true
  pn:
    type: string
    description: Product name.
    examples:
      - "sparen 3a"
  cp:
    type: object
    description: Contribution potential (indicative, provider-specific view).
    properties:
      cy:
        type: number
        format: double
        description: |
          Indicative remaining contribution capacity for the current year at this provider. 
          Calculated as the applicable annual cap minus deposits already made at THIS provider. 
          No guarantee of total tax deductibility if other 3a accounts exist.
        examples: [2500.00]
      ret:
        type: number
        format: double
        description: |
          Indicative potential for retroactive purchases (past years). 
          Based solely on information available to this provider. 
          Non-binding and without legal effect regarding tax deductibility.
        examples: [8400.00]
  rd:
    $ref: ./generic/Date.yaml
    description: Reference date of 3a account statement.
  ts:
    $ref: ./generic/DateTime.yaml
    description: Date and time of generation of the 3a account statement.
