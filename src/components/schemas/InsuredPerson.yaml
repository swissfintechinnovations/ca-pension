description: Details of insured person.
type: object
required:
  - birthDate
  - firstName
  - lastName
  - maritalStatus
  - personId
  - policyIds
  - sex
  - ssn
properties:
  birthDate:
    $ref: ./generic/Date.yaml
    description: Birth date.
  firstName:
    type: string
    description: First name(s).
    examples:
      - John
  lastName:
    type: string
    description: Last name / family name.
    examples:
      - Doe
  maritalStatus:
    $ref: ./MaritalStatus.yaml
  personId:
    $ref: ./PersonId.yaml
  policyIds:
    type: array
    items:
      $ref: ./PolicyId.yaml
    description: List of IDs of policies that insured person has with this pension fund.
  sex:
    $ref: ./Sex.yaml
  ssn:
    type: integer
    format: int64
    description: Social security number.
    examples:
      - 7561234567890
  address:
    $ref: ./Address.yaml
  marriageDate:
    $ref: ./generic/Date.yaml
    description: Date of marriage (or registration of partnership). Required if `maritalStatus` is `married`.
